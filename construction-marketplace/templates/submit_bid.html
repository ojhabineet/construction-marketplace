<!DOCTYPE html>
<html>
<head>
    <title>Submit Bid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>Submit Your Bid</h3>
        <form method="POST">
            <input type="number" name="amount" class="form-control mb-3" placeholder="Your Quoted Price (₹)" required>
            <input type="text" name="timeline" class="form-control mb-3" placeholder="Estimated Timeline (e.g., 6 months)" required>

            <button class="btn btn-success w-100">Submit Bid</button>
        </form>
    </div>
</div>

</body>
</html>
