<!DOCTYPE html>
<html>
<head>
    <title>Post Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>Post New Construction Project</h3>
        <form method="POST">
            <input type="text" name="title" class="form-control mb-3" placeholder="Project Title" required>
            <textarea name="description" class="form-control mb-3" placeholder="Project Description" required></textarea>
            <input type="number" name="budget" class="form-control mb-3" placeholder="Budget (₹)" required>
            <input type="text" name="location" class="form-control mb-3" placeholder="Location" required>

            <button class="btn btn-primary w-100">Submit Project</button>
        </form>
    </div>
</div>

</body>
</html>
